# ============================================================
# Emotion CT Pipeline — Infrastructure Services
# ============================================================
#
# Usage:
#   Start Argilla only:   docker compose -f docker-compose-infra.yml --profile argilla up -d
#   Start MLflow only:    docker compose -f docker-compose-infra.yml --profile mlflow  up -d
#   Start everything:     docker compose -f docker-compose-infra.yml --profile all     up -d
#
# First-time setup:
#   cp .env.example .env && vi .env   # set secrets
#   docker compose -f docker-compose-infra.yml --profile all up -d
#
# UIs:
#   Argilla    → http://localhost:6900   (admin / adminpassword)
#   MLflow     → http://localhost:5000
#   MinIO      → http://localhost:9001   (minioadmin / minioadmin)
# ============================================================

name: emotion-ct-infra

services:

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # SHARED — PostgreSQL
  #   Database argilla → dùng bởi Argilla server
  #   Database mlflow  → dùng bởi MLflow tracking server
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  postgres:
    image: postgres:15-alpine
    container_name: ct-postgres
    profiles: [ argilla, mlflow, all ]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adminpass}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init script tạo database argilla và mlflow khi container khởi tạo lần đầu
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # ARGILLA — Human Labeling UI
  # http://localhost:6900
  #
  # Stack: Elasticsearch (search) + Redis (job queue) + Argilla server + Worker
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: ct-elasticsearch
    profiles: [ argilla, all ]
    environment:
      - node.name=ct-elasticsearch
      - cluster.name=argilla-cluster
      - discovery.type=single-node
      # Giảm RAM cho dev (production: tăng lên 2-4g)
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      # Tắt security cho môi trường dev (bật lên khi production)
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test:
        - CMD-SHELL
        - |
          curl -s http://localhost:9200/_cluster/health \
          | grep -qE '"status":"(green|yellow)"'
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  argilla-redis:
    image: redis:7-alpine
    container_name: ct-argilla-redis
    profiles: [ argilla, all ]
    ports:
      - "${ARGILLA_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  argilla:
    image: argilladev/argilla-server:releases-2.7.0
    container_name: ct-argilla
    profiles: [ argilla, all ]
    ports:
      - "${ARGILLA_PORT:-6900}:6900"
    environment:
      ARGILLA_ELASTICSEARCH: http://elasticsearch:9200
      # asyncpg driver cho PostgreSQL async
      ARGILLA_DATABASE_URL: >-
        postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-adminpass}@postgres:5432/argilla
      ARGILLA_REDIS_URL: redis://argilla-redis:6379/0
      # Credentials mặc định — đổi trong .env khi production
      USERNAME: ${ARGILLA_USERNAME:-admin}
      PASSWORD: ${ARGILLA_PASSWORD:-adminpassword}
      API_KEY: ${ARGILLA_API_KEY:-argilla.apikey}
      ARGILLA_HOME_PATH: /var/lib/argilla
    volumes:
      - argilla_data:/var/lib/argilla
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      argilla-redis:
        condition: service_healthy
    restart: unless-stopped

  # Background worker xử lý jobs async (import datasets, bulk operations)
  argilla-worker:
    image: argilladev/argilla-server:releases-2.7.0
    container_name: ct-argilla-worker
    profiles: [ argilla, all ]
    # rq worker cho Argilla v2.x
    command: [ "python", "-m", "argilla_server", "worker" ]
    environment:
      ARGILLA_ELASTICSEARCH: http://elasticsearch:9200
      ARGILLA_DATABASE_URL: >-
        postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-adminpass}@postgres:5432/argilla
      ARGILLA_REDIS_URL: redis://argilla-redis:6379/0
    depends_on:
      argilla:
        condition: service_started
    restart: unless-stopped

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # MLFLOW — Experiment Tracking + Model Registry
  # http://localhost:5000
  #
  # Stack: MinIO (S3 artifact store) + MLflow server (PostgreSQL backend)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  minio:
    image: minio/minio:latest
    container_name: ct-minio
    profiles: [ mlflow, all ]
    ports:
      - "${MINIO_API_PORT:-9000}:9000" # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # Web UI
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # One-shot container tạo bucket mlflow-artifacts nếu chưa có
  minio-init:
    image: minio/mc:latest
    container_name: ct-minio-init
    profiles: [ mlflow, all ]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/mlflow-artifacts;
        mc mb --ignore-existing local/model-artifacts;
        echo 'MinIO buckets ready: mlflow-artifacts, model-artifacts';
      "
    restart: "no"

  mlflow:
    build:
      context: docker/mlflow
      dockerfile: Dockerfile
    image: emotion-ct-mlflow:latest
    container_name: ct-mlflow
    profiles: [ mlflow, all ]
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    environment:
      # S3 → MinIO
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: >
      mlflow server --backend-store-uri postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-adminpass}@postgres:5432/mlflow --default-artifact-root s3://mlflow-artifacts --host 0.0.0.0 --port 5000
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Named volumes — data persist khi container restart/recreate
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
volumes:
  postgres_data:
    name: ct_postgres_data
  elasticsearch_data:
    name: ct_elasticsearch_data
  argilla_data:
    name: ct_argilla_data
  minio_data:
    name: ct_minio_data
